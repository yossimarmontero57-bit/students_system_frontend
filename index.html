<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Estudiantes Josimar Montero</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1>Gestión de Estudiantes Josimar Montero</h1>
        <p>Sistema de gestión de estudiantes del curso TM-3100 Programación</p>
    </header>

    <main class="container">

        <section class="card">
            <h2>Registrar curso</h2>

            <form id="courseForm">
                <label>Código del curso</label>
                <input type="text" id="courseCode" required>

                <label>Nombre del curso</label>
                <input type="text" id="courseName" required>

                <button type="submit">Guardar curso</button>
            </form>
        </section>

        <section class="card">
            <h2>Listado de cursos</h2>

            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="coursesTable"></tbody>
            </table>
        </section>

        <section class="card">
            <h2>Registrar estudiante</h2>

            <form id="studentForm">
                <input type="hidden" id="editingCarnet">

                <label>Carnet</label>
                <input type="text" id="carnet" required>

                <label>Nombre</label>
                <input type="text" id="name" required>

                <label>Edad</label>
                <input type="number" id="age" required min="1">

                <label>Curso</label>
                <select id="courseId" required>
                    <option value="">Seleccione un curso</option>
                </select>

                <button type="submit" id="saveBtn">Guardar</button>
                <button type="button" id="cancelBtn" class="secondary">Cancelar</button>
            </form>
        </section>

        <section class="card">
            <h2>Buscar por nombre</h2>

            <div class="search-box">
                <input type="text" id="searchName" placeholder="Digite un nombre">
                <button onclick="searchByName()">Buscar</button>
                <button class="secondary" onclick="loadStudents()">Mostrar todos</button>
            </div>
        </section>

        <section class="actions">
            <button onclick="loadAverageAge()">Promedio de edad</button>
            <button onclick="loadAdults()">Mayores de 18</button>
        </section>

        <section class="card">
            <h2>Listado de estudiantes</h2>
            <p id="message"></p>

            <table>
                <thead>
                    <tr>
                        <th>Carnet</th>
                        <th>Nombre</th>
                        <th>Edad</th>
                        <th>Curso</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="studentsTable"></tbody>
            </table>
        </section>

    </main>

    <script src="js/app.js"></script>
</body>

</html>
